<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Arch | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트 연결 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 헤더 / 내비게이션 -->
    <header>
        <div class="logo">ARTEMIS ARCH</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="#projects">PROJECTS</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <!-- 메인 상단 (Hero Section) -->
    <section class="hero-section">
        <div class="hero-container">
            <div class="hero-text">
                <h1>We Provide<br>the Essential Value</h1>
                <p>공간의 본질적인 가치를 담아내는 상업 공간 설계 및 브랜딩을 지향합니다.</p>
            </div>
            <div class="hero-image">
                <!-- 깃허브에 있는 logo.png나 메인 이미지를 연결해보세요 -->
                <img src="logo.png" alt="Main Image">
            </div>
        </div>
    </section>

    <!-- 포트폴리오 그리드 섹션 -->
    <section id="projects" class="portfolio-section">
        <div class="section-title">
            <h2>OUR PROJECTS</h2>
            <p>공간 설계, 디자인 시안 및 브랜딩 프로젝트</p>
        </div>
        
        <div class="portfolio-grid">
            <!-- 각 이미지 아이템 (추후 실제 이미지 파일명으로 변경 가능) -->
            <div class="grid-item tall"><img src="logo.png" alt="Project 1"></div>
            <div class="grid-item"><img src="logo.png" alt="Project 2"></div>
            <div class="grid-item"><img src="logo.png" alt="Project 3"></div>
            <div class="grid-item wide"><img src="logo.png" alt="Project 4"></div>
            <div class="grid-item"><img src="logo.png" alt="Project 5"></div>
            <div class="grid-item tall"><img src="logo.png" alt="Project 6"></div>
        </div>
    </section>

    <!-- 푸터 -->
    <footer>
        <p>&copy; 2026 ARTEMIS ARCH. All Rights Reserved.</p>
    </footer>

</body>
</html>
