<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES DESIGN | Portfolio Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ----------------------------------------------------------------------
         * 1. 전역 레이아웃 및 디자인 무드 고정
         * ---------------------------------------------------------------------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #111111;
            overflow-x: hidden;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background-color: #ffffff; border-bottom: 1px solid #f0f0f0; z-index: 1000;
        }
        .logo a { font-size: 1.15rem; font-weight: 700; letter-spacing: 2px; color: #111; text-decoration: none; }
        nav a { font-size: 0.85rem; font-weight: 500; letter-spacing: 1.5px; color: #555; text-decoration: none; margin-left: 30px; transition: color 0.2s; }
        nav a:hover, nav a.admin-btn { color: #111; }
        nav a.admin-btn { font-weight: 700; color: #d9534f; }

        .page-section {
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px);
            background-color: #ffffff; z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; overflow-y: auto; padding: 60px 20px;
        }
        .page-section:target { opacity: 1; pointer-events: auto; z-index: 100; }

        #home-hero {
            position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px);
            display: flex; align-items: center; justify-content: center; background-color: #fafafa; padding: 0 40px; text-align: center;
        }
        .hero-text-full h1 { font-size: 3rem; font-weight: 700; line-height: 1.2; letter-spacing: -1px; margin-bottom: 15px; }
        .hero-text-full .sub-slogan { font-size: 1.1rem; color: #666; font-weight: 400; margin-bottom: 25px; }
        .hero-text-full .description { max-width: 600px; margin: 0 auto; font-size: 0.95rem; color: #888; line-height: 1.6; word-break: keep-all; }

        .about-content { max-width: 800px; margin: 40px auto; text-align: center; }
        .about-content h2 { font-size: 2rem; letter-spacing: 1px; margin-bottom: 20px; }
        .about-content p { font-size: 1rem; color: #444; line-height: 1.8; margin-bottom: 15px; word-break: keep-all; }

        /* ----------------------------------------------------------------------
         * 2. PROJECTS 카테고리 필터 그리드
         * ---------------------------------------------------------------------- */
        .projects-container { max-width: 1200px; margin: 0 auto; width: 100%; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; }
        .section-title p { font-size: 0.9rem; color: #777; }

        .filter-controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 35px; }
        .filter-controls button {
            font-size: 0.8rem; font-weight: 500; color: #999; background: none;
            cursor: pointer; padding: 8px 16px; border: 1px solid #e5e5e5; transition: all 0.2s;
        }
        .filter-controls button.active { background-color: #111111; color: #ffffff; border-color: #111111; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; width: 100%; }
        .grid-item { position: relative; width: 100%; padding-top: 100%; overflow: hidden; display: block; transition: all 0.3s ease; cursor: pointer; }
        .grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .grid-item:hover img { transform: scale(1.04); }
        
        .item-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.25s;
            color: #fff; text-align: center; padding: 15px;
        }
        .grid-item:hover .item-overlay { opacity: 1; }
        .item-overlay h4 { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
        .item-overlay p { font-size: 0.75rem; opacity: 0.8; font-weight: 300; line-height: 1.3; }

        /* ----------------------------------------------------------------------
         * 3. 한 프로젝트 내 다중 이미지 순환형 중앙 슬라이더 팝업
         * ---------------------------------------------------------------------- */
        .project-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: rgba(0, 0, 0, 0.85); z-index: 2000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { position: relative; max-width: 800px; width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; color: #fff; }
        .modal-img-box { width: 100%; height: 60vh; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.1); background-color: #000; position: relative; }
        .modal-img-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .modal-info h4 { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
        .modal-info p { font-size: 0.85rem; font-weight: 300; opacity: 0.8; line-height: 1.4; }
        
        .close-modal-btn { position: absolute; top: -50px; right: 0; font-size: 2rem; font-weight: 300; color: #ffffff; text-decoration: none; padding: 10px; cursor: pointer; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2.5rem; color: rgba(255, 255, 255, 0.3); text-decoration: none; padding: 20px 10px; font-family: monospace; transition: all 0.2s; user-select: none; cursor: pointer; z-index: 2100; }
        .nav-arrow:hover { color: rgba(255, 255, 255, 1); }
        .arrow-left { left: -60px; }
        .arrow-right { right: -60px; }
        
        /* 인디케이터 (현재 장수 표시) */
        .slide-counter { font-size: 0.8rem; margin-top: 5px; opacity: 0.5; font-weight: 400; }

        /* ----------------------------------------------------------------------
         * 4. 관리자 로그인 보안 잠금창 및 대시보드
         * ---------------------------------------------------------------------- */
        .admin-login-container { max-width: 360px; margin: 100px auto; text-align: center; border: 1px solid #eee; padding: 40px 30px; background: #fafafa; }
        .admin-login-container h3 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #ddd; margin-bottom: 12px; font-size: 0.9rem; }
        .login-btn { width: 100%; padding: 12px; background: #111; color: #fff; border: none; font-weight: 700; cursor: pointer; }

        .admin-main-dashboard { display: none; } /* 로그인 전 숨김 처리 */
        .admin-wrapper { max-width: 900px; margin: 0 auto; width: 100%; }
        .admin-form-box { background: #f9f9f9; padding: 25px; border: 1px solid #eee; margin-bottom: 40px; }
        .admin-form-box h3 { margin-bottom: 15px; font-size: 1.1rem; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; font-weight: 700; color: #666; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ddd; font-size: 0.9rem; width: 100%; }
        
        /* 파일 다중선택 커스텀 스타일 */
        .file-count-info { font-size: 0.8rem; color: #666; font-weight: 500; margin-top: 2px; }
        .submit-btn { background: #111; color: #fff; border: none; padding: 12px; font-size: 0.9rem; cursor: pointer; font-weight: 500; width: 100%; margin-top: 10px; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .admin-table th { background: #f4f4f4; font-weight: 700; }
        .admin-thumb { width: 50px; height: 50px; object-fit: cover; border: 1px solid #ddd; margin-right: 3px; display: inline-block; }
        .action-btn { padding: 5px 10px; border: none; font-size: 0.75rem; cursor: pointer; margin-right: 5px; }
        .delete-btn { background: #d9534f; color: #fff; }
        
        .logout-top-btn { background: none; border: 1px solid #ddd; padding: 5px 10px; font-size: 0.75rem; cursor: pointer; float: right; margin-top: -30px; }

        /* ----------------------------------------------------------------------
         * 5. CONTACT 지도 섬네일 픽셀 보정 최적화 스타일
         * ---------------------------------------------------------------------- */
        .contact-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80%; width: 100%; }
        .contact-box { max-width: 360px; width: 100%; text-align: center; }
        .map-container { width: 100%; margin: 20px 0; }
        .map-thumbnail-box { 
            width: 100%; 
            height: 155px; 
            border: 1px solid #e5e5e5; 
            background-color: #fafafa; 
            overflow: hidden; 
            margin-bottom: 10px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-thumbnail-box img { 
            width: 100%; 
            height: 10
